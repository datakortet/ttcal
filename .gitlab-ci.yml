
include:
  - project: 'norsktest/dktools'
    file: '/ci-templates/dkbuild.yml'


# ──────────────────────────────────────────────────────────────────────────────
# SAST REPORT — push semgrep results to cimonitor
# ──────────────────────────────────────────────────────────────────────────────
sast_report:
    image: alpine:latest
    stage: test
    needs:
        - job: semgrep-sast
          artifacts: true
    allow_failure: true
    rules:
        - if: $SAST_DISABLED
          when: never
        - when: on_success
    script:
        - |
            if [ ! -f gl-sast-report.json ]; then
                echo "No SAST report found, skipping"
                exit 0
            fi
            apk add --no-cache curl jq
            jq -n \
                --arg pkg "$CI_PROJECT_NAME" \
                --arg pipeline_id "$CI_PIPELINE_ID" \
                --arg pipeline_url "$CI_PIPELINE_URL" \
                --arg job_url "$CI_JOB_URL" \
                --arg commit_sha "$CI_COMMIT_SHA" \
                --arg branch "$CI_COMMIT_REF_NAME" \
                --slurpfile report gl-sast-report.json \
                '{
                    pkg: $pkg,
                    pipeline_id: $pipeline_id,
                    pipeline_url: $pipeline_url,
                    job_url: $job_url,
                    commit_sha: $commit_sha,
                    branch: $branch,
                    report: $report[0]
                }' | curl -sf \
                    -X POST \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer $CIMONITOR_TOKEN" \
                    -d @- \
                    "$CIMONITOR_URL/api/sast/ingest"


deploy_code:
  stage: deploy
  image: thebjorn/dktestpackage3:latest
  before_script:
    - eval $(ssh-agent -s)
    - ssh-add <(echo "$DEPLOY_PKEY")
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - dk pkg
    - ssh -v deploy@fischer.datakortet.c.bitbit.net "cd /srv/lib/core/ttcal && git pull"
  environment:
    name: production
    url: https://admin.datakortet.no/userenv/
  when: manual
  only:
    - master
    - pushes
    - web
